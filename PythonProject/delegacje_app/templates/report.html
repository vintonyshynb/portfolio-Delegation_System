<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Raport</title>
</head>

<body class="bg-light">
<div class="container mt-4">

    <h3>Raport delegacji</h3>

    <table class="table table-striped">
        <tr>
            <th>ID</th>
            <th>Data</th>
            <th>Waluta</th>
            <th>Paliwo PLN</th>
            <th>Nocleg PLN</th>
            <th>Dieta PLN</th>
        </tr>

        {% for i in trips %}
        <tr>
            <td>{{i[0]}}</td>
            <td>{{i[1]}}</td>
            <td>{{i[2]}}</td>
            <td>{{i[3]}}</td>
            <td>{{i[4]}}</td>
            <td>{{i[5]}}</td>
        </tr>
        {% endfor %}
    </table>

    <h4>Suma wszystkich delegacij: {{total}} PLN</h4>
    <a class="btn btn-secondary" href="/">Powrót</a>

</div>
</body>
</html>
